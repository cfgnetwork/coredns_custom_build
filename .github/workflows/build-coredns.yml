name: build coredns

# 手动触发即可; 一次并行编译所有平台
on:
  workflow_dispatch:
    inputs:
      lite:
        description: 'LITE 精简版? (1=是, 空=否)'
        required: false
        default: ''
      release_tag:
        description: 'Release 版本号 (如 v1.14.6-custom; 留空则不发 Release, 只出 artifact)'
        required: false
        default: ''

# 授予创建 Release 的写权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # 某个平台失败不影响其它平台继续编
      matrix:
        include:
          - name: linux-amd64        # Alpine / Debian x86_64 (你的 lanDNS53)
            goos: linux
            goarch: amd64
            goarm: ''
          - name: windows-amd64      # Windows 10 / 11 x64
            goos: windows
            goarch: amd64
            goarm: ''
          - name: linux-arm64        # 树莓派 3/4/5 (64位系统, aarch64)
            goos: linux
            goarch: arm64
            goarm: ''
          - name: linux-armv7        # 树莓派 2/3/4 (32位系统)
            goos: linux
            goarch: arm
            goarm: '7'
          - name: linux-armv6        # 树莓派 1 / Zero / Zero W
            goos: linux
            goarch: arm
            goarm: '6'

    name: build-${{ matrix.name }}
    steps:
      - name: Checkout custom build repo
        uses: actions/checkout@v5
        with:
          path: coredns_custom_build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
        env:
          GOTOOLCHAIN: auto   # 按 coredns/.go-version 自动拉精确 toolchain

      - name: Clone coredns + dnsredir (同级目录)
        run: |
          git clone --depth=1 https://github.com/coredns/coredns.git
          git clone --depth=1 https://github.com/leiless/dnsredir.git

      - name: Patch forward plugin (sed, 替代脆弱的 git apply)
        working-directory: coredns
        run: |
          set -e
          F=plugin/forward/forward.go
          S=plugin/forward/setup.go
          perl -0pi -e 's/(\t"errors"\n)/$1\t"strings"\n/' "$F"
          perl -0pi -e 's/\tignored \[\]string/\tignored map[string]struct{}/' "$F"
          perl -0pi -e 's/(f := &Forward\{maxfails: 2,)/$1 ignored: make(map[string]struct{}),/' "$F"
          perl -0pi -e 's/\tfor _, ignore := range f\.ignored \{\n\t\tif plugin\.Name\(ignore\)\.Matches\(name\) \{\n\t\t\treturn false\n\t\t\}\n\t\}/\tss := strings.Split(name, ".")\n\tfor i := 0; i < len(ss); i++ {\n\t\tn := strings.Join(ss[i:], ".")\n\t\tif _, ok := f.ignored[n]; ok {\n\t\t\treturn false\n\t\t}\n\t}/' "$F"
          perl -0pi -e 's/\t\t\tf\.ignored = append\(f\.ignored, plugin\.Host\(ignore\[i\]\)\.NormalizeExact\(\)\.\.\.\)/\t\t\tfor _, ignored := range plugin.Host(ignore[i]).NormalizeExact() {\n\t\t\t\tf.ignored[ignored] = struct{}{}\n\t\t\t}/' "$S"
          grep -q "ignored map\[string\]struct{}" "$F" || { echo "FATAL: forward patch 失败"; exit 1; }
          echo "OK: forward 加速补丁已应用"

      - name: Inject plugins into plugin.cfg
        working-directory: coredns
        run: |
          NL=$'\\\n'
          # 官方已自带 https:https(DoH 转发), 不注入第三方 v-byte-cpu/coredns-https(撞名 panic)
          sed -i.bak "s|forward:forward|fallback:github.com/missdeer/fallback${NL}dnsredir:github.com/leiless/dnsredir${NL}forward:forward${NL}proxy:github.com/missdeer/proxy|g" plugin.cfg
          sed -i.bak "s|hosts:hosts|ads:github.com/missdeer/ads${NL}blocklist:github.com/relekang/coredns-blocklist${NL}hosts:hosts|g" plugin.cfg
          sed -i.bak "s|rewrite:rewrite|rewrite:rewrite${NL}bogus:github.com/missdeer/bogus${NL}ipset:github.com/missdeer/ipset|g" plugin.cfg
          sed -i.bak "s|cache:cache|cache:cache${NL}redisc:github.com/missdeer/redis|g" plugin.cfg
          printf '\nreplace (\n    github.com/leiless/dnsredir => ../dnsredir\n)\n' >> go.mod
          for p in azure route53 trace etcd clouddns k8s_external kubernetes; do
            sed -i.bak "/$p/d" plugin.cfg
          done
          if [ "${{ github.event.inputs.lite }}" = "1" ]; then
            for p in geoip nsid debug trace autopath erratic metadata cancel pprof dnstap dns64 acl chaos dnssec secondary loop grpc sign; do
              sed -i.bak "/$p/d" plugin.cfg
            done
          fi
          rm -f plugin.cfg.bak
          echo "----- plugin.cfg -----"; cat plugin.cfg
          # === 硬校验①: dnsredir 三处保障必须齐全 ===
          grep -q '^dnsredir:github.com/leiless/dnsredir' plugin.cfg || { echo "FATAL: dnsredir 未注入 plugin.cfg"; exit 1; }
          grep -q 'github.com/leiless/dnsredir => ../dnsredir' go.mod || { echo "FATAL: dnsredir 缺少 go.mod replace"; exit 1; }
          test -d ../dnsredir || { echo "FATAL: ../dnsredir 源码目录不存在"; exit 1; }
          echo "OK: dnsredir 三处保障齐全"

      - name: Build (${{ matrix.name }})
        working-directory: coredns
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
          GO111MODULE: 'on'
        run: |
          # generate/get 用 host 平台(linux/amd64)跑一次即可
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go generate coredns.go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go get
          # make 用目标平台交叉编译; Windows 需显式指定 .exe 输出名(Makefile 硬编码 -o coredns 不会自动加扩展名)
          BIN=coredns; [ "$GOOS" = "windows" ] && BIN=coredns.exe
          make BINARY="$BIN"
          test -f "./$BIN" || { echo "FATAL: 编译产物 $BIN 不存在"; exit 1; }
          file "./$BIN"
          # === 硬校验②: dnsredir 必须真正编入二进制 ===
          if [ "$GOOS" = "linux" ] && [ "$GOARCH" = "amd64" ]; then
            # 本机平台: 直接运行验证
            ./coredns -plugins
            ./coredns -plugins | grep -qE 'dnsredir$' && echo "OK: dnsredir 已编入(运行验证)" || { echo "FATAL: dnsredir 缺失"; exit 1; }
          else
            # 交叉编译平台(arm/windows): 无法运行, 用符号/字符串验证
            (go tool nm "./$BIN" 2>/dev/null | grep -q 'leiless/dnsredir' || strings "./$BIN" | grep -q 'leiless/dnsredir') \
              && echo "OK: dnsredir 已编入(符号验证)" || { echo "FATAL: dnsredir 缺失"; exit 1; }
          fi

      - name: Package + checksums
        working-directory: coredns
        run: |
          BIN=coredns; [ "${{ matrix.goos }}" = "windows" ] && BIN=coredns.exe
          OUT="coredns-${{ matrix.name }}${{ github.event.inputs.lite && '-lite' || '' }}"
          mkdir -p "$OUT"
          cp "$BIN" "$OUT/"
          sha256sum "$BIN" | tee "$OUT/$BIN.sha256"
          md5sum "$BIN"    | tee "$OUT/$BIN.md5"
          # 打成 zip 供 Release 直接分发
          zip -r "$OUT.zip" "$OUT"
          ls -l "$OUT.zip"

      - name: Upload artifact (${{ matrix.name }})
        uses: actions/upload-artifact@v6
        with:
          name: coredns-${{ matrix.name }}${{ github.event.inputs.lite && '-lite' || '' }}
          path: coredns/coredns-${{ matrix.name }}${{ github.event.inputs.lite && '-lite' || '' }}.zip
          if-no-files-found: error

  # ===== 汇总: 等 5 平台全部编完, 下载所有 zip 并发到 Release =====
  release:
    needs: build
    if: ${{ github.event.inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Collect zips
        run: |
          mkdir -p release
          # download-artifact 会按 artifact 名建子目录, 把里面的 zip 全捞出来
          find dist -name '*.zip' -exec cp {} release/ \;
          echo "----- release 内容 -----"
          ls -l release/

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          # 若 tag 已存在则先删旧 Release(保留 tag), 再重建, 保证可重复发布
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 && \
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes || true
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "CoreDNS custom build $TAG" \
            --notes "自定义 CoreDNS 构建 (含 dnsredir/fallback/proxy/ads/bogus/ipset/blocklist/redis + 官方 https + forward 加速补丁)。多平台: linux-amd64 / windows-amd64 / linux-arm64 / linux-armv7 / linux-armv6。每个 zip 内附 sha256 与 md5 校验和。" \
            release/*.zip
          echo "==== Release 已发布: $TAG ===="
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY"
