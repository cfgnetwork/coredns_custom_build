name: build coredns

# 手动触发 + 可选平台参数
on:
  workflow_dispatch:
    inputs:
      goos:
        description: 'GOOS (linux/windows/darwin/freebsd...)'
        required: true
        default: 'linux'
      goarch:
        description: 'GOARCH (amd64/arm64/arm/386...)'
        required: true
        default: 'amd64'
      goarm:
        description: 'GOARM (只 arm 用: 5/6/7, 其他留空)'
        required: false
        default: ''
      lite:
        description: 'LITE 精简版? (1=是, 空=否)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout custom build repo
        uses: actions/checkout@v5
        with:
          path: coredns_custom_build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
        env:
          # 允许 Go 按 coredns/.go-version 自动拉取精确 toolchain(1.26.5)
          GOTOOLCHAIN: auto

      - name: Clone coredns + dnsredir (同级目录)
        run: |
          git clone --depth=1 https://github.com/coredns/coredns.git
          git clone --depth=1 https://github.com/leiless/dnsredir.git

      - name: Patch forward plugin (sed, 替代脆弱的 git apply)
        working-directory: coredns
        run: |
          set -e
          F=plugin/forward/forward.go
          S=plugin/forward/setup.go
          # 1) 加 strings import
          perl -0pi -e 's/(\t"errors"\n)/$1\t"strings"\n/' "$F"
          # 2) 字段类型 slice -> map
          perl -0pi -e 's/\tignored \[\]string/\tignored map[string]struct{}/' "$F"
          # 3) New() 里初始化 map (原补丁遗漏, 否则运行时 panic)
          perl -0pi -e 's/(f := &Forward\{maxfails: 2,)/$1 ignored: make(map[string]struct{}),/' "$F"
          # 4) isAllowedDomain: 逐级后缀查 map (加速 except 列表)
          perl -0pi -e 's/\tfor _, ignore := range f\.ignored \{\n\t\tif plugin\.Name\(ignore\)\.Matches\(name\) \{\n\t\t\treturn false\n\t\t\}\n\t\}/\tss := strings.Split(name, ".")\n\tfor i := 0; i < len(ss); i++ {\n\t\tn := strings.Join(ss[i:], ".")\n\t\tif _, ok := f.ignored[n]; ok {\n\t\t\treturn false\n\t\t}\n\t}/' "$F"
          # 5) setup.go: 写入 map 而非 append slice
          perl -0pi -e 's/\t\t\tf\.ignored = append\(f\.ignored, plugin\.Host\(ignore\[i\]\)\.NormalizeExact\(\)\.\.\.\)/\t\t\tfor _, ignored := range plugin.Host(ignore[i]).NormalizeExact() {\n\t\t\t\tf.ignored[ignored] = struct{}{}\n\t\t\t}/' "$S"
          echo "----- forward.go 变更校验 -----"
          grep -n "ignored map\[string\]struct{}" "$F"
          grep -n "ignored: make(map\[string\]struct{})" "$F"
          grep -n '"strings"' "$F"

      - name: Inject plugins into plugin.cfg
        working-directory: coredns
        run: |
          NL=$'\\\n'
          # 注: 官方 CoreDNS 现已自带 https:https(DoH 转发)插件, 不再注入第三方 v-byte-cpu/coredns-https(会与官方撞名 panic)
          sed -i.bak "s|forward:forward|fallback:github.com/missdeer/fallback${NL}dnsredir:github.com/leiless/dnsredir${NL}forward:forward${NL}proxy:github.com/missdeer/proxy|g" plugin.cfg
          sed -i.bak "s|hosts:hosts|ads:github.com/missdeer/ads${NL}blocklist:github.com/relekang/coredns-blocklist${NL}hosts:hosts|g" plugin.cfg
          sed -i.bak "s|rewrite:rewrite|rewrite:rewrite${NL}bogus:github.com/missdeer/bogus${NL}ipset:github.com/missdeer/ipset|g" plugin.cfg
          sed -i.bak "s|cache:cache|cache:cache${NL}redisc:github.com/missdeer/redis|g" plugin.cfg
          printf '\nreplace (\n    github.com/leiless/dnsredir => ../dnsredir\n)\n' >> go.mod
          for p in azure route53 trace etcd clouddns k8s_external kubernetes; do
            sed -i.bak "/$p/d" plugin.cfg
          done
          if [ "${{ github.event.inputs.lite }}" = "1" ]; then
            for p in geoip nsid debug trace autopath erratic metadata cancel pprof dnstap dns64 acl chaos dnssec secondary loop grpc sign; do
              sed -i.bak "/$p/d" plugin.cfg
            done
          fi
          rm -f plugin.cfg.bak
          echo "----- plugin.cfg -----"
          cat plugin.cfg
          # === 硬校验①: dnsredir 三处保障必须齐全, 否则立即失败 ===
          echo "----- dnsredir 保障校验 -----"
          grep -q '^dnsredir:github.com/leiless/dnsredir' plugin.cfg || { echo "FATAL: dnsredir 未注入 plugin.cfg"; exit 1; }
          grep -q 'github.com/leiless/dnsredir => ../dnsredir' go.mod || { echo "FATAL: dnsredir 缺少 go.mod replace"; exit 1; }
          test -d ../dnsredir || { echo "FATAL: ../dnsredir 源码目录不存在"; exit 1; }
          echo "OK: dnsredir 三处保障齐全 (plugin.cfg + go.mod replace + 源码目录)"

      - name: Build
        working-directory: coredns
        env:
          GOOS: ${{ github.event.inputs.goos }}
          GOARCH: ${{ github.event.inputs.goarch }}
          GOARM: ${{ github.event.inputs.goarm }}
          CGO_ENABLED: '0'
          GO111MODULE: 'on'
        run: |
          # 忠实复刻 AppVeyor: go generate -> go get -> make (host 平台跑 generate/get)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go generate coredns.go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go get
          make
          BIN=coredns; [ "$GOOS" = "windows" ] && BIN=coredns.exe
          file "./$BIN"
          echo "==== plugins ===="
          if [ "$GOOS" = "linux" ] && [ "$GOARCH" = "amd64" ]; then
            ./coredns -plugins
            # === 硬校验②: dnsredir 必须真正编入二进制 ===
            if ./coredns -plugins | grep -qE 'dnsredir$'; then
              echo "OK: dnsredir 已编入二进制"
            else
              echo "FATAL: dnsredir 未出现在 coredns -plugins 输出中!"; exit 1
            fi
          fi

      - name: Package + checksums
        working-directory: coredns
        run: |
          BIN=coredns; [ "${{ github.event.inputs.goos }}" = "windows" ] && BIN=coredns.exe
          sha256sum "$BIN" | tee "$BIN.sha256"
          md5sum "$BIN" | tee "$BIN.md5"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: coredns-${{ github.event.inputs.goos }}-${{ github.event.inputs.goarch }}${{ github.event.inputs.goarm }}${{ github.event.inputs.lite && '-lite' || '' }}
          path: |
            coredns/coredns
            coredns/coredns.exe
            coredns/*.sha256
            coredns/*.md5
          if-no-files-found: warn
